# =============================================================================
# Mosquitto MQTT Broker - Configuração para Altus Mobile + CLP XP340
# =============================================================================
# Fluxo: App Android (celular) --> Mosquitto --> CLP XP340
#
# Como usar:
#   1. Copie este arquivo para o diretório de instalação do Mosquitto
#      (geralmente C:\Program Files\mosquitto\mosquitto.conf)
#   2. Crie as pastas de log e dados abaixo, se não existirem
#   3. Inicie o serviço: net start mosquitto
#      (ou reinicie se já estava rodando)
# =============================================================================

# -----------------------------------------------------------------------------
# Listener - Aceita conexões na rede local (todas as interfaces)
# -----------------------------------------------------------------------------
listener 1883

# Aceita conexões de qualquer IP na rede local.
# Em produção, substitua por autenticação (veja seção abaixo).
allow_anonymous true

# -----------------------------------------------------------------------------
# Persistência - Mantém mensagens retained entre reinicializações
# -----------------------------------------------------------------------------
persistence true
persistence_location C:\mosquitto\data\

# -----------------------------------------------------------------------------
# Log
# -----------------------------------------------------------------------------
log_type error
log_type warning
log_type notice
log_type information
log_dest file C:\mosquitto\log\mosquitto.log

# -----------------------------------------------------------------------------
# Keepalive / conexão
# -----------------------------------------------------------------------------
# Tempo máximo (segundos) sem atividade antes de encerrar a conexão
max_keepalive 120

# -----------------------------------------------------------------------------
# (OPCIONAL) Autenticação com usuário e senha
# Descomente se quiser proteger o broker.
# Para criar o arquivo de senhas:
#   mosquitto_passwd -c C:\mosquitto\passwd\usuarios.txt altus
# -----------------------------------------------------------------------------
# allow_anonymous false
# password_file C:\mosquitto\passwd\usuarios.txt
